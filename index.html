<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Straftaten-Rechner</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">MDT</div>
      <div>
        <div class="title">Straftaten-Rechner</div>
        <div class="subtitle">Katalog → Auswahl → Aktenzeile</div>
      </div>
    </div>

    <div class="top-actions">
      <button id="btnReset" class="btn ghost">Zurücksetzen</button>
      <button id="btnCopy" class="btn">Aktenzeile kopieren</button>
    </div>
  </header>

  <main class="layout">
    <section class="left">
      <div class="searchbar">
        <input id="searchInput" type="search" placeholder="Suche nach Paragraph oder Bezeichnung..." />
        <div class="pill"><span id="selectedCount">0</span> ausgewählt</div>
      </div>

      <div class="section-title">STRAFGESETZBUCH (StGB)</div>
      <div id="cards" class="cards"></div>
    </section>

    <aside class="right">
      <div class="panel">
        <div class="panel-title">ZUSAMMENFASSUNG</div>
        <div class="summary-grid">
          <div class="summary-box">
            <div class="label">GELDSTRAFE</div>
            <div class="value" id="sumFine">$0</div>
          </div>
          <div class="summary-box">
            <div class="label">WANTED-LEVEL</div>
            <div class="value" id="sumWanted">—</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">STRAFMODIFIKATION</div>

        <label class="toggle">
          <span>§35 Abs. 1 — Reue</span>
          <input id="modReue" type="checkbox" />
          <span class="switch"></span>
        </label>
        <div class="hint">-20% Geldstrafe</div>

        <label class="toggle">
          <span>§25 Abs. 2 — Wiederholungstäter</span>
          <input id="modRepeat" type="checkbox" />
          <span class="switch"></span>
        </label>
        <div class="hint">+50% Geldstrafe</div>

        <div class="row">
          <div class="row-label">Systemwanteds</div>
          <select id="modSystem">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="hint">Addiert Wanted-Level pauschal</div>
      </div>

      <div class="panel">
        <div class="panel-title">AKTENZEILE</div>
        <input id="azInput" class="text" placeholder="z.B. AZ-2026-001" />
        <textarea id="aktenText" class="textarea" placeholder="Wird automatisch erstellt..." readonly></textarea>
        <div class="smallrow">
          <div class="muted" id="lastUpdate">—</div>
          <div class="muted" id="copyState"></div>
        </div>
      </div>
    </aside>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
